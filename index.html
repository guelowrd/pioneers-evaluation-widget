<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pioneer Evaluation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F5F5F5;
      color: #1A1A1A;
      padding: 24px 16px 48px;
      min-height: 100vh;
    }

    .widget {
      max-width: 1200px;
      margin: 0 auto;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      overflow: hidden;
    }

    /* Header */
    .header {
      padding: 20px 28px;
      border-bottom: 1px solid #EBEBEB;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .wordmark {
      font-size: 20px;
      font-weight: 700;
      color: #FF5500;
      letter-spacing: -0.5px;
    }
    .wordmark span { color: #1A1A1A; }
    .header-title {
      font-size: 13px;
      font-weight: 500;
      color: #888;
      margin-left: auto;
    }

    /* Questions */
    .questions { padding: 20px 28px; display: flex; flex-direction: column; gap: 22px; }

    .question-row {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      transition: opacity 0.2s;
    }

    .question-row.locked { opacity: 0.35; pointer-events: none; transition: opacity 0.2s; }

    .question-label-col {
      flex: 0 0 200px;
      padding-top: 6px;
    }
    .question-label {
      font-size: 13px;
      font-weight: 600;
      color: #1A1A1A;
      line-height: 1.4;
    }
    .question-hint {
      font-size: 11.5px;
      color: #888;
      margin-top: 3px;
      line-height: 1.4;
    }

    .question-options {
      flex: 1;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: flex-start;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid #E0E0E0;
      background: #FAFAFA;
      font-size: 12.5px;
      font-weight: 500;
      color: #444;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s, opacity 0.15s;
      user-select: none;
      white-space: nowrap;
    }
    .pill:hover { border-color: #FF5500; color: #FF5500; }
    .pill.selected {
      border-color: #FF5500;
      background: #FFF3EE;
      color: #CC3300;
    }
    .pill.dimmed { opacity: 0.3; pointer-events: none; }
    .pill .pts-badge {
      font-size: 11px;
      font-weight: 600;
      color: #FF5500;
      background: #FFE8D9;
      border-radius: 10px;
      padding: 1px 6px;
    }
    .pill.selected .pts-badge { background: #FFCFB3; }

    /* Score bar */
    .score-section {
      padding: 20px 28px;
      border-top: 1px solid #EBEBEB;
    }
    .score-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 10px;
    }
    .score-label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .score-value { font-size: 22px; font-weight: 700; color: #1A1A1A; }
    .score-max { font-size: 13px; color: #AAA; font-weight: 500; }

    .bar-container { position: relative; }
    .bar-track {
      height: 10px;
      background: #EBEBEB;
      border-radius: 6px;
      overflow: visible;
      position: relative;
    }
    .bar-fill {
      height: 100%;
      background: #FF5500;
      border-radius: 6px;
      transition: width 0.25s ease;
      min-width: 0;
    }

    .ticks {
      position: relative;
      height: 26px;
      margin-top: 2px;
    }
    .tick {
      position: absolute;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .tick-line {
      width: 1.5px;
      height: 6px;
      background: #CCC;
    }
    .tick-label {
      font-size: 10px;
      color: #AAA;
      font-weight: 500;
      margin-top: 2px;
    }

    /* Outcome */
    .outcome-section { padding: 0 28px 24px; }
    .outcome-card {
      border-radius: 10px;
      padding: 16px 18px;
      transition: background 0.25s, border-color 0.25s;
      border: 1.5px solid transparent;
    }
    .outcome-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
    }
    .outcome-emoji { font-size: 18px; }
    .outcome-label { font-size: 15px; font-weight: 700; }
    .outcome-desc { font-size: 12.5px; line-height: 1.5; opacity: 0.85; }

    .special-warning {
      margin-top: 10px;
      font-size: 12px;
      font-weight: 500;
      color: #7A4500;
      background: #FFF3CD;
      border: 1px solid #FFD97D;
      border-radius: 6px;
      padding: 8px 12px;
      display: none;
    }
    .special-warning.visible { display: block; }

    .hard-stop-note {
      margin-top: 10px;
      font-size: 12px;
      font-weight: 500;
      color: #C0270F;
      background: #FFF0EE;
      border: 1px solid #F5B8B0;
      border-radius: 6px;
      padding: 8px 12px;
      display: none;
    }
    .hard-stop-note.visible { display: block; }

    /* Copy button */
    .copy-section {
      padding: 0 28px 28px;
      display: flex;
      justify-content: flex-end;
    }
    .copy-btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      border-radius: 8px;
      border: 1.5px solid #E0E0E0;
      background: #FAFAFA;
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #444;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .copy-btn:hover:not(:disabled) { border-color: #FF5500; color: #FF5500; background: #FFF3EE; }
    .copy-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .copy-btn.copied { border-color: #22A05B; color: #22A05B; background: #EEFAF3; }

    .divider { border: none; border-top: 1px solid #EBEBEB; margin: 0 28px; }

    /* Flowchart */
    .flowchart-section { border-top: 1px solid #EBEBEB; padding: 16px 28px 24px; }
    .flowchart-toggle {
      background: none;
      border: none;
      font: 600 13px 'Inter', sans-serif;
      color: #888;
      cursor: pointer;
      padding: 0;
    }
    .flowchart-toggle:hover { color: #FF5500; }
    .flowchart-body { max-height: 0; overflow: hidden; transition: max-height 0.5s ease; }
    .flowchart-body.open { max-height: 4000px; }

    /* Scoring reference table */
    .scoring-ref { margin-top: 16px; }
    .scoring-ref-title {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .scoring-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 9px;
    }
    .scoring-table th {
      text-align: left;
      font-size: 8px;
      font-weight: 600;
      color: #AAA;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 3px 6px 5px;
      border-bottom: 1px solid #EBEBEB;
    }
    .scoring-table td {
      padding: 5px 6px;
      vertical-align: top;
      border-bottom: 1px solid #F5F5F5;
    }
    .scoring-table tr:last-child td { border-bottom: none; }
    .q-badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 10px;
      font-size: 8px;
      font-weight: 700;
      white-space: nowrap;
    }
    .scoring-opts { list-style: none; margin: 0; padding: 0; }
    .scoring-opts li { margin-bottom: 1px; color: #555; }
    .scoring-opts li span { font-weight: 600; color: #333; }
    .scoring-special-note {
      margin-top: 10px;
      font-size: 9px;
      color: #7A4500;
      background: #FFF8EE;
      border: 1px solid #FFD97D;
      border-radius: 6px;
      padding: 6px 10px;
    }
    .outcome-bar {
      display: flex;
      margin-top: 10px;
      border-radius: 6px;
      overflow: hidden;
      height: 22px;
    }
    .outcome-bar-seg {
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 8px;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      padding: 0 3px;
    }
  </style>
</head>
<body>
<div class="widget">
  <div class="header">
    <div class="wordmark">✦ <span>Miden</span></div>
    <div class="header-title">Pioneer &amp; Grant Evaluation</div>
  </div>

  <div class="questions" id="questions"></div>

  <hr class="divider" />

  <div class="score-section">
    <div class="score-header">
      <div class="score-label">Score</div>
      <div>
        <span class="score-value" id="scoreValue">0</span>
        <span class="score-max" id="scoreMax">/ 30</span>
      </div>
    </div>
    <div class="bar-container">
      <div class="bar-track">
        <div class="bar-fill" id="barFill" style="width:0%"></div>
      </div>
      <div class="ticks" id="ticks"></div>
    </div>
  </div>

  <div class="outcome-section">
    <div class="outcome-card" id="outcomeCard">
      <div class="outcome-top">
        <span class="outcome-emoji" id="outcomeEmoji">—</span>
        <span class="outcome-label" id="outcomeLabel">Answer all questions to see outcome</span>
      </div>
      <div class="outcome-desc" id="outcomeDesc"></div>
    </div>
    <div class="hard-stop-note" id="hardStopNote"></div>
  </div>

  <div class="copy-section">
    <button class="copy-btn" id="copyBtn" disabled>
      <svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="5" y="5" width="8" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
        <path d="M3 10H2.5A1.5 1.5 0 011 8.5v-7A1.5 1.5 0 012.5 0h7A1.5 1.5 0 0111 1.5V2" stroke="currentColor" stroke-width="1.4"/>
      </svg>
      Copy evaluation
    </button>
  </div>

  <div class="flowchart-section">
    <button class="flowchart-toggle" id="flowchartToggle">↳ Visualize the full decision flowchart</button>
    <div class="flowchart-body" id="flowchartBody"></div>
  </div>
</div>

<script>
(async () => {
  const config = await fetch('./config.json').then(r => r.json());
  const { questions, outcomes, maxScore, thresholdTicks } = config;

  // State
  const state = {};
  for (const q of questions) {
    state[q.id] = q.type === 'multi' ? new Set() : null;
  }

  // ── DOM refs ──
  const scoreValue     = document.getElementById('scoreValue');
  const scoreMax       = document.getElementById('scoreMax');
  const barFill        = document.getElementById('barFill');
  const ticks          = document.getElementById('ticks');
  const outcomeCard    = document.getElementById('outcomeCard');
  const outcomeEmoji   = document.getElementById('outcomeEmoji');
  const outcomeLabel   = document.getElementById('outcomeLabel');
  const outcomeDesc    = document.getElementById('outcomeDesc');
  const hardStopNote   = document.getElementById('hardStopNote');
  const copyBtn        = document.getElementById('copyBtn');

  scoreMax.textContent = `/ ${maxScore}`;

  // ── Render ticks ──
  for (const tick of thresholdTicks) {
    const el = document.createElement('div');
    el.className = 'tick';
    el.style.left = `${(tick / maxScore) * 100}%`;
    el.innerHTML = `<div class="tick-line"></div><div class="tick-label">${tick}</div>`;
    ticks.appendChild(el);
  }

  // ── Render questions ──
  const questionsEl = document.getElementById('questions');
  const questionRows = {}; // qId → row element
  for (const q of questions) {
    const row = document.createElement('div');
    row.className = 'question-row';
    row.dataset.qid = q.id;
    questionRows[q.id] = row;

    const labelCol = document.createElement('div');
    labelCol.className = 'question-label-col';
    labelCol.innerHTML = `<div class="question-label">${q.label}</div><div class="question-hint">${q.hint}</div>`;
    row.appendChild(labelCol);

    const optionsEl = document.createElement('div');
    optionsEl.className = 'question-options';
    optionsEl.id = `opts-${q.id}`;

    for (let i = 0; i < q.options.length; i++) {
      const opt = q.options[i];
      const pill = document.createElement('button');
      pill.className = 'pill';
      pill.dataset.qid = q.id;
      pill.dataset.idx = i;
      pill.setAttribute('type', 'button');

      const label = document.createTextNode(opt.label);
      pill.appendChild(label);

      if (opt.points > 0) {
        const badge = document.createElement('span');
        badge.className = 'pts-badge';
        badge.textContent = `+${opt.points}`;
        pill.appendChild(badge);
      }

      if (q.type === 'single') {
        pill.addEventListener('click', () => handleSingle(q, i, opt));
      } else {
        pill.addEventListener('click', () => handleMulti(q, i, opt));
      }

      optionsEl.appendChild(pill);
    }

    row.appendChild(optionsEl);
    questionsEl.appendChild(row);
  }

  // ── Handlers ──
  function handleSingle(q, idx, opt) {
    const prev = state[q.id];
    if (prev && prev.index === idx) {
      state[q.id] = null;
    } else {
      state[q.id] = { index: idx, label: opt.label, points: opt.points };
    }
    renderSinglePills(q);
    update();
  }

  function handleMulti(q, idx, opt) {
    const sel = state[q.id];
    const exclusiveIdx = q.options.findIndex(o => o.exclusive);

    if (opt.exclusive) {
      if (sel.has(idx)) {
        sel.delete(idx);
      } else {
        sel.clear();
        sel.add(idx);
      }
    } else {
      if (sel.has(idx)) {
        sel.delete(idx);
      } else {
        if (exclusiveIdx !== -1) sel.delete(exclusiveIdx);
        sel.add(idx);
      }
    }

    renderMultiPills(q);
    update();
  }

  function renderSinglePills(q) {
    const container = document.getElementById(`opts-${q.id}`);
    const pills = container.querySelectorAll('.pill');
    pills.forEach((pill, i) => {
      pill.classList.toggle('selected', state[q.id] !== null && state[q.id].index === i);
    });
  }

  function renderMultiPills(q) {
    const sel = state[q.id];
    const exclusiveIdx = q.options.findIndex(o => o.exclusive);
    const exclusiveActive = exclusiveIdx !== -1 && sel.has(exclusiveIdx);
    const container = document.getElementById(`opts-${q.id}`);
    const pills = container.querySelectorAll('.pill');
    pills.forEach((pill, i) => {
      const isSelected = sel.has(i);
      pill.classList.toggle('selected', isSelected);
      if (exclusiveActive && !q.options[i].exclusive) {
        pill.classList.add('dimmed');
      } else {
        pill.classList.remove('dimmed');
      }
    });
  }

  // ── Hard stop ──
  function isHardStop() {
    for (let i = 0; i < questions.length; i++) {
      const q = questions[i];
      if (!q.hardStop) continue;
      if (q.type === 'single') {
        const s = state[q.id];
        if (s === null) continue; // unanswered
        if (s.points === q.hardStopAnswer) return { triggered: true, qId: q.id, qIdx: i };
      } else {
        // multi: hard stop if user made a selection and total pts = 0
        const sel = state[q.id];
        if (sel.size === 0) continue; // unanswered
        if (getMultiPoints(q) === 0) return { triggered: true, qId: q.id, qIdx: i };
      }
    }
    return { triggered: false };
  }

  // ── Score calc ──
  function calcScore() {
    let total = 0;
    for (const q of questions) {
      if (q.type === 'single') {
        if (state[q.id]) total += state[q.id].points;
      } else {
        const sel = state[q.id];
        for (const idx of sel) {
          total += q.options[idx].points;
        }
      }
    }
    return total;
  }

  function getMultiPoints(q) {
    let pts = 0;
    for (const idx of state[q.id]) pts += q.options[idx].points;
    return pts;
  }

  // ── All answered? ──
  function allAnswered() {
    for (const q of questions) {
      if (q.type === 'single') {
        if (state[q.id] === null) return false;
      } else {
        if (state[q.id].size === 0) return false;
      }
    }
    return true;
  }

  // ── Get outcome by score ──
  function getOutcome(score) {
    for (const o of outcomes) {
      if (score >= o.minScore && score <= o.maxScore) return o;
    }
    return outcomes[0];
  }

  // ── Update UI ──
  function update() {
    const raw = calcScore();
    const hardStop = isHardStop();

    if (hardStop.triggered) {
      // Force 🔴 outcome
      const q = questions[hardStop.qIdx];
      const forceOutcome = outcomes[0];
      scoreValue.textContent = raw;
      barFill.style.width = `${Math.min(raw / maxScore, 1) * 100}%`;

      outcomeCard.style.background = forceOutcome.bg || '#F5F5F5';
      outcomeCard.style.borderColor = forceOutcome.color || 'transparent';
      outcomeEmoji.textContent = forceOutcome.emoji || '—';
      outcomeLabel.textContent = forceOutcome.label;
      outcomeLabel.style.color = forceOutcome.color || '#1A1A1A';
      outcomeDesc.textContent = forceOutcome.description || '';
      outcomeDesc.style.color = forceOutcome.color || '#444';

      hardStopNote.textContent = `\u26d4 "${q.label}" scored 0 \u2014 hard stop.`;
      hardStopNote.classList.add('visible');

      // Lock only questions after the hard-stop question; unlock those before/at it
      for (let i = 0; i < questions.length; i++) {
        const row = questionRows[questions[i].id];
        if (i > hardStop.qIdx) {
          row.classList.add('locked');
        } else {
          row.classList.remove('locked');
        }
      }

      copyBtn.disabled = true;
      return;
    }

    // No hard stop — unlock all rows
    for (const q of questions) {
      questionRows[q.id].classList.remove('locked');
    }
    hardStopNote.classList.remove('visible');

    const outcome = getOutcome(raw);

    scoreValue.textContent = raw;
    barFill.style.width = `${Math.min(raw / maxScore, 1) * 100}%`;

    outcomeCard.style.background = outcome.bg || '#F5F5F5';
    outcomeCard.style.borderColor = outcome.color || 'transparent';
    outcomeEmoji.textContent = outcome.emoji || '—';
    outcomeLabel.textContent = outcome.label;
    outcomeLabel.style.color = outcome.color || '#1A1A1A';
    outcomeDesc.textContent = outcome.description || '';
    outcomeDesc.style.color = outcome.color || '#444';

    copyBtn.disabled = !allAnswered();
  }

  // ── Copy ──
  copyBtn.addEventListener('click', () => {
    const raw = calcScore();
    const outcome = getOutcome(raw);

    const date = new Date().toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
    const sep = '━'.repeat(40);

    let lines = [`Pioneer Evaluation — ${date}`, sep, ''];

    for (const q of questions) {
      lines.push(`${q.label}`);
      if (q.type === 'single') {
        const s = state[q.id];
        lines.push(`→ ${s.label} (+${s.points} pts)`);
      } else {
        const sel = state[q.id];
        if (sel.size === 0) {
          lines.push('→ (none selected)');
        } else {
          for (const idx of sel) {
            const opt = q.options[idx];
            lines.push(`→ ${opt.label} (+${opt.points} pts)`);
          }
        }
      }
      lines.push('');
    }

    lines.push(sep);
    lines.push(`TOTAL SCORE: ${raw} / ${maxScore}`);
    lines.push(`OUTCOME: ${outcome.label}`);
    lines.push(outcome.description);

    navigator.clipboard.writeText(lines.join('\n')).then(() => {
      copyBtn.textContent = 'Copied ✓';
      copyBtn.classList.add('copied');
      setTimeout(() => {
        copyBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="5" y="5" width="8" height="9" rx="1.5" stroke="currentColor" stroke-width="1.4"/><path d="M3 10H2.5A1.5 1.5 0 011 8.5v-7A1.5 1.5 0 012.5 0h7A1.5 1.5 0 0111 1.5V2" stroke="currentColor" stroke-width="1.4"/></svg> Copy evaluation`;
        copyBtn.classList.remove('copied');
      }, 2000);
    });
  });

  // ── Flowchart ──
  let flowchartBuilt = false;
  const flowchartToggle = document.getElementById('flowchartToggle');
  const flowchartBody   = document.getElementById('flowchartBody');

  flowchartToggle.addEventListener('click', () => {
    const isOpen = flowchartBody.classList.toggle('open');
    flowchartToggle.textContent = isOpen
      ? '↑ Hide decision flowchart'
      : '↳ Visualize the full decision flowchart';
    if (isOpen && !flowchartBuilt) {
      flowchartBody.appendChild(buildFlowchartSVG(config));
      flowchartBody.appendChild(buildScoringReference(config));
      flowchartBuilt = true;
    }
  });

  // ── Flowchart-only mode (?flowchart) ──
  if (new URLSearchParams(location.search).has('flowchart')) {
    ['questions'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.style.display = 'none';
    });
    ['.divider', '.score-section', '.outcome-section', '.copy-section'].forEach(sel => {
      document.querySelectorAll(sel).forEach(el => el.style.display = 'none');
    });
    flowchartBody.classList.add('open');
    flowchartToggle.style.display = 'none';
    flowchartBody.appendChild(buildFlowchartSVG(config));
    flowchartBody.appendChild(buildScoringReference(config));
    flowchartBuilt = true;
  }

  function svgEl(tag, attrs, children) {
    const ns = 'http://www.w3.org/2000/svg';
    const el = document.createElementNS(ns, tag);
    for (const [k, v] of Object.entries(attrs || {})) el.setAttribute(k, v);
    for (const child of (children || [])) {
      if (typeof child === 'string') {
        el.appendChild(document.createTextNode(child));
      } else {
        el.appendChild(child);
      }
    }
    return el;
  }

  function svgText(x, y, text, attrs) {
    return svgEl('text', { x, y, ...attrs }, [text]);
  }

  function svgRect(x, y, w, h, attrs) {
    return svgEl('rect', { x, y, width: w, height: h, ...attrs });
  }

  function svgLine(x1, y1, x2, y2, attrs) {
    return svgEl('line', { x1, y1, x2, y2, ...attrs });
  }

  function svgPath(d, attrs) {
    return svgEl('path', { d, ...attrs });
  }

  function buildFlowchartSVG(cfg) {
    const W       = 720;
    const cx      = 360;
    const nodeW   = 340;
    const nodeH   = 40;   // was 60 (−33%)
    const gap     = 36;   // was 80 (−55%)
    const gateH   = 44;
    const fontFam = 'Inter, sans-serif';

    // Y layout (computed from scaled constants)
    const startY  = 12;
    const pillH   = 22;
    const q1y     = startY + pillH + gap;          // 70
    const q2y     = q1y  + nodeH + gap;            // 146
    const q3y     = q2y  + nodeH + gap;            // 222
    const q45y    = q3y  + nodeH + gap;            // 298
    const gateY   = q45y + nodeH + gap;            // 374
    const fanH    = 46;
    const fanY    = gateY + gateH + 30;            // 442
    const H       = fanY + fanH + 8;               // 490

    const svg = svgEl('svg', {
      viewBox: `0 0 ${W} ${H}`,
      width: '100%',
      style: 'display:block; margin-top:12px;'
    });

    // Arrow markers
    const defs = svgEl('defs');
    const marker = svgEl('marker', {
      id: 'arrow', markerWidth: '7', markerHeight: '7',
      refX: '5', refY: '3', orient: 'auto'
    });
    marker.appendChild(svgPath('M0,0 L0,6 L7,3 z', { fill: '#999' }));
    defs.appendChild(marker);

    const markerRed = svgEl('marker', {
      id: 'arrowRed', markerWidth: '7', markerHeight: '7',
      refX: '5', refY: '3', orient: 'auto'
    });
    markerRed.appendChild(svgPath('M0,0 L0,6 L7,3 z', { fill: '#C0270F' }));
    defs.appendChild(markerRed);

    svg.appendChild(defs);

    // Helper: node box with label + sublabel
    function drawNode(g, x, y, w, h, bg, border, label, sublabel, textColor) {
      g.appendChild(svgRect(x, y, w, h, { rx: 6, fill: bg, stroke: border, 'stroke-width': 1.5 }));
      g.appendChild(svgText(x + w / 2, y + (sublabel ? h / 2 - 5 : h / 2), label, {
        'font-family': fontFam, 'font-size': 8.5, 'font-weight': 600,
        fill: textColor, 'text-anchor': 'middle', 'dominant-baseline': 'middle'
      }));
      if (sublabel) {
        g.appendChild(svgText(x + w / 2, y + h / 2 + 11, sublabel, {
          'font-family': fontFam, 'font-size': 7, 'font-weight': 400,
          fill: textColor, 'text-anchor': 'middle', 'dominant-baseline': 'middle',
          opacity: 0.75
        }));
      }
    }

    // Helper: down arrow with optional label
    function arrowDown(g, x, y1, y2, label) {
      g.appendChild(svgLine(x, y1, x, y2 - 6, {
        stroke: '#999', 'stroke-width': 1.5, 'marker-end': 'url(#arrow)'
      }));
      if (label) {
        g.appendChild(svgText(x + 5, (y1 + y2) / 2, label, {
          'font-family': fontFam, 'font-size': 6.5, fill: '#888',
          'text-anchor': 'start', 'dominant-baseline': 'middle'
        }));
      }
    }

    // Helper: left-branch reject box
    const rejectX = 5;
    const rejectW = 100;
    const rejectH = 28;
    function drawReject(g, gy, branchLabel) {
      const rY = gy + 6;
      const nodeLeft = cx - nodeW / 2;
      g.appendChild(svgLine(nodeLeft, gy + nodeH / 2, rejectX + rejectW, rY + rejectH / 2, {
        stroke: '#C0270F', 'stroke-width': 1.5, 'marker-end': 'url(#arrowRed)'
      }));
      g.appendChild(svgText((nodeLeft + rejectX + rejectW) / 2, rY - 7, branchLabel, {
        'font-family': fontFam, 'font-size': 6.5, fill: '#C0270F', 'text-anchor': 'middle'
      }));
      g.appendChild(svgRect(rejectX, rY, rejectW, rejectH, { rx: 5, fill: '#FFF0EE', stroke: '#C0270F', 'stroke-width': 1.5 }));
      g.appendChild(svgText(rejectX + rejectW / 2, rY + rejectH / 2 - 5, '\uD83D\uDD34 Not at this stage', {
        'font-family': fontFam, 'font-size': 7, 'font-weight': 600,
        fill: '#C0270F', 'text-anchor': 'middle', 'dominant-baseline': 'middle'
      }));
      g.appendChild(svgText(rejectX + rejectW / 2, rY + rejectH / 2 + 7, '(hard stop)', {
        'font-family': fontFam, 'font-size': 6.5, fill: '#C0270F',
        'text-anchor': 'middle', 'dominant-baseline': 'middle', opacity: 0.75
      }));
    }

    const g = svgEl('g');
    svg.appendChild(g);

    // ── Start pill ──
    g.appendChild(svgRect(cx - 80, startY, 160, pillH, { rx: 11, fill: '#FF5500' }));
    g.appendChild(svgText(cx, startY + pillH / 2, 'New team reaches out', {
      'font-family': fontFam, 'font-size': 8.5, 'font-weight': 600,
      fill: '#fff', 'text-anchor': 'middle', 'dominant-baseline': 'middle'
    }));

    const qs = cfg.questions;

    // ── Q1: Technical delivery confidence ──
    arrowDown(g, cx, startY + pillH, q1y);
    drawNode(g, cx - nodeW / 2, q1y, nodeW, nodeH,
      '#EEF3FA', '#B8CCE8',
      'Q1 \u2014 ' + qs[0].label,
      qs[0].hint,
      '#1A3A5C');
    drawReject(g, q1y, '<60% \u2192 hard stop');

    // ── Q2: Business delivery confidence ──
    arrowDown(g, cx, q1y + nodeH, q2y, '\u2265 1 pt \u2192 continue');
    drawNode(g, cx - nodeW / 2, q2y, nodeW, nodeH,
      '#EEF3FA', '#B8CCE8',
      'Q2 \u2014 ' + qs[1].label,
      qs[1].hint,
      '#1A3A5C');
    drawReject(g, q2y, '<60% \u2192 hard stop');

    // ── Q3: Ecosystem fit ──
    arrowDown(g, cx, q2y + nodeH, q3y, '\u2265 1 pt \u2192 continue');
    drawNode(g, cx - nodeW / 2, q3y, nodeW, nodeH,
      '#EEF3FA', '#B8CCE8',
      'Q3 \u2014 ' + qs[2].label,
      qs[2].hint,
      '#1A3A5C');
    drawReject(g, q3y, 'total = 0 \u2192 hard stop');

    // ── Q4 + Q5 combined ──
    arrowDown(g, cx, q3y + nodeH, q45y, '\u2265 1 pt \u2192 continue');
    drawNode(g, cx - nodeW / 2, q45y, nodeW, nodeH,
      '#EEF3FA', '#B8CCE8',
      'Q4 + Q5 \u2014 Build status & Uniqueness',
      'Score both, no hard gates \u2192 adding to total',
      '#1A3A5C');

    // ── Score gate ──
    arrowDown(g, cx, q45y + nodeH, gateY);
    g.appendChild(svgRect(cx - nodeW / 2, gateY, nodeW, gateH, { rx: 6, fill: '#1A1A1A' }));
    g.appendChild(svgText(cx, gateY + 10, 'Do we proceed with this team?', {
      'font-family': fontFam, 'font-size': 9, 'font-weight': 700,
      fill: '#fff', 'text-anchor': 'middle', 'dominant-baseline': 'middle'
    }));
    g.appendChild(svgText(cx, gateY + 20, 'Total score \u2014 max 30 pts', {
      'font-family': fontFam, 'font-size': 7, 'font-weight': 400,
      fill: '#fff', 'text-anchor': 'middle', 'dominant-baseline': 'middle', opacity: 0.7
    }));

    // Mini threshold bar inside score gate
    const barY = gateY + 30;
    const barX = cx - nodeW / 2 + 10;
    const barW = nodeW - 20;
    const segs = [
      { label: '0\u201314', pct: 14 / 30, color: '#C0270F' },
      { label: '15\u201319', pct: 5 / 30, color: '#7A4500' },
      { label: '20\u201324', pct: 5 / 30, color: '#0A5C35' },
      { label: '25\u201327', pct: 3 / 30, color: '#063D23' },
      { label: '28\u201330', pct: 3 / 30, color: '#3D2D8A' }
    ];
    let bx = barX;
    for (const seg of segs) {
      const sw = barW * seg.pct;
      g.appendChild(svgRect(bx, barY, sw, 10, { fill: seg.color }));
      g.appendChild(svgText(bx + sw / 2, barY + 5, seg.label, {
        'font-family': fontFam, 'font-size': 5.5, 'font-weight': 600,
        fill: '#fff', 'text-anchor': 'middle', 'dominant-baseline': 'middle'
      }));
      bx += sw;
    }

    // ── Outcome fan ──
    arrowDown(g, cx, gateY + gateH, fanY);

    const fanBoxW = 130;
    const fanSpacing = (W - 20 - fanBoxW) / (cfg.outcomes.length - 1);
    // Custom display labels (two lines where needed) + score range
    const fanItems = [
      { line1: 'No, not at this stage',               line2: null,                         range: '0\u201314'  },
      { line1: 'Needs further discussion',            line2: '\u2192 team chat',            range: '15\u201319' },
      { line1: 'Yes, but tech support only',          line2: '\u2192 team chat',            range: '20\u201324' },
      { line1: 'Yes, $10k POC first then grant',      line2: '\u2192 team chat',            range: '25\u201327' },
      { line1: 'Yes, but strategic chat for',         line2: 'Bobbin / Azeem / Dominik',   range: '28\u201330' },
    ];

    cfg.outcomes.forEach((o, i) => {
      const fx   = 10 + i * fanSpacing;
      const item = fanItems[i];
      g.appendChild(svgRect(fx, fanY, fanBoxW, fanH, {
        rx: 6, fill: o.bg, stroke: o.color, 'stroke-width': 1.5
      }));
      g.appendChild(svgText(fx + fanBoxW / 2, fanY + 10, o.emoji, {
        'font-family': fontFam, 'font-size': 10, 'text-anchor': 'middle', 'dominant-baseline': 'middle'
      }));
      if (item.line2) {
        g.appendChild(svgText(fx + fanBoxW / 2, fanY + 21, item.line1, {
          'font-family': fontFam, 'font-size': 6.5, 'font-weight': 600,
          fill: o.color, 'text-anchor': 'middle', 'dominant-baseline': 'middle'
        }));
        g.appendChild(svgText(fx + fanBoxW / 2, fanY + 30, item.line2, {
          'font-family': fontFam, 'font-size': 6.5, 'font-weight': 600,
          fill: o.color, 'text-anchor': 'middle', 'dominant-baseline': 'middle'
        }));
        g.appendChild(svgText(fx + fanBoxW / 2, fanY + 40, item.range, {
          'font-family': fontFam, 'font-size': 6.5, fill: o.color,
          'text-anchor': 'middle', 'dominant-baseline': 'middle', opacity: 0.75
        }));
      } else {
        g.appendChild(svgText(fx + fanBoxW / 2, fanY + 25, item.line1, {
          'font-family': fontFam, 'font-size': 6.5, 'font-weight': 600,
          fill: o.color, 'text-anchor': 'middle', 'dominant-baseline': 'middle'
        }));
        g.appendChild(svgText(fx + fanBoxW / 2, fanY + 37, item.range, {
          'font-family': fontFam, 'font-size': 6.5, fill: o.color,
          'text-anchor': 'middle', 'dominant-baseline': 'middle', opacity: 0.75
        }));
      }
    });

    return svg;
  }

  function buildScoringReference(cfg) {
    const { questions, outcomes } = cfg;

    const badgeColors = [
      { bg: '#B8CCE8', color: '#1A3A5C' },
      { bg: '#B8CCE8', color: '#1A3A5C' },
      { bg: '#B8CCE8', color: '#1A3A5C' },
      { bg: '#B8CCE8', color: '#1A3A5C' },
      { bg: '#B8CCE8', color: '#1A3A5C' },
    ];

    const div = document.createElement('div');
    div.className = 'scoring-ref';

    const title = document.createElement('div');
    title.className = 'scoring-ref-title';
    title.textContent = 'Scoring Reference \u2014 All 5 Questions';
    div.appendChild(title);

    const table = document.createElement('table');
    table.className = 'scoring-table';

    const thead = document.createElement('thead');
    thead.innerHTML = '<tr><th>Q</th><th>Question</th><th>Options &amp; Points</th></tr>';
    table.appendChild(thead);

    const tbody = document.createElement('tbody');
    questions.forEach((q, i) => {
      const bc = badgeColors[i] || badgeColors[1];
      const tr = document.createElement('tr');

      const tdQ = document.createElement('td');
      const badge = document.createElement('span');
      badge.className = 'q-badge';
      badge.style.background = bc.bg;
      badge.style.color = bc.color;
      badge.textContent = q.id.toUpperCase();
      if (q.hardStop) {
        badge.title = 'Hard stop';
        badge.textContent += ' ⛔';
      }
      tdQ.appendChild(badge);
      tr.appendChild(tdQ);

      const tdLabel = document.createElement('td');
      tdLabel.textContent = q.label;
      tdLabel.style.fontWeight = '500';
      tdLabel.style.fontSize = '9px';
      tr.appendChild(tdLabel);

      const tdOpts = document.createElement('td');
      const ul = document.createElement('ul');
      ul.className = 'scoring-opts';
      for (const opt of q.options) {
        const li = document.createElement('li');
        li.innerHTML = `${opt.label} <span>+${opt.points} pt${opt.points !== 1 ? 's' : ''}</span>`;
        ul.appendChild(li);
      }
      if (q.type === 'multi') {
        const note = document.createElement('li');
        note.style.color = '#888';
        note.style.fontStyle = 'italic';
        note.textContent = '(multi-select, points stack)';
        ul.appendChild(note);
      }
      tdOpts.appendChild(ul);
      tr.appendChild(tdOpts);

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);
    div.appendChild(table);

    // Outcome bar
    const barDiv = document.createElement('div');
    barDiv.className = 'outcome-bar';
    const scoreRanges = ['0–14', '15–19', '20–24', '25–27', '28–30'];
    outcomes.forEach((o, i) => {
      const seg = document.createElement('div');
      seg.className = 'outcome-bar-seg';
      seg.style.background = o.color;
      seg.style.color = '#fff';
      seg.textContent = `${o.emoji} ${scoreRanges[i]}`;
      barDiv.appendChild(seg);
    });
    div.appendChild(barDiv);

    return div;
  }

  // Initial render
  update();
})();
</script>
</body>
</html>
